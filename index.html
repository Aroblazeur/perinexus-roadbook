<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#12372a">
  <title>Roadbook</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%2312372a'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-size='34' fill='white'%3EP%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
  <a class="skip-link" href="#day-card-host">Aller au contenu</a>

  <header class="hero">
    <div class="container hero__content">
      <div>
        <p class="eyebrow" id="brand-eyebrow"></p>
        <h1 id="brand-title">Roadbook</h1>
        <p class="hero__tagline" id="brand-tagline"></p>
      </div>
      <div class="bike-mark" aria-hidden="true">&#x1f6b2;</div>
    </div>
  </header>

  <main class="container layout" id="app" aria-busy="true">
    <section class="card summary" aria-labelledby="roadbook-title">
      <div id="roadbook-info" aria-live="polite">
        <p class="loading">Chargement du roadbook...</p>
      </div>
      <dl class="summary__stats" id="trip-stats" hidden></dl>
    </section>

    <section class="card map-section" aria-labelledby="map-title">
      <div class="section-heading map-section__heading">
        <div>
          <p class="eyebrow">Vue d’ensemble</p>
          <h2 id="map-title">Carte du parcours</h2>
        </div>
      </div>
      <div id="roadbook-map" tabindex="0" aria-label="Carte interactive du parcours"></div>
      <p id="map-fallback" class="map-fallback" role="status" hidden></p>
      <p id="map-status" class="sr-only" role="status" aria-live="polite"></p>
    </section>

    <section class="stage-picker" aria-labelledby="stage-picker-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Itinéraire</p>
          <h2 id="stage-picker-title">Les étapes</h2>
        </div>
        <p id="stage-count"></p>
      </div>
      <ol id="stage-list" class="stage-list"></ol>
    </section>

    <nav class="day-nav" id="day-navigation" aria-label="Navigation entre les étapes">
      <button id="previous-day" type="button">&#x2190; <span>Précédent</span></button>
      <div class="day-nav__status">
        <span id="current-day"></span>
        <div class="progress" aria-hidden="true"><span id="progress-bar"></span></div>
      </div>
      <button id="next-day" type="button"><span>Suivant</span> &#x2192;</button>
    </nav>

    <div id="day-card-host" aria-live="polite"></div>
    <section id="app-error" class="card error-card" role="alert" hidden></section>
  </main>

  <footer><div class="container"><strong id="footer-title"></strong><span id="footer-message"></span></div></footer>
  <script type="module" src="js/app.js"></script>
</body>
</html>
