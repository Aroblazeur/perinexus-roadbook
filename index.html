<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#12372a">
  <title>Roadbook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#stage-detail">Aller au contenu</a>

  <header class="hero">
    <div class="container hero__content">
      <div>
        <p class="eyebrow" id="brand-eyebrow"></p>
        <h1 id="brand-title">Roadbook</h1>
        <p class="hero__tagline" id="brand-tagline"></p>
      </div>
      <div class="bike-mark" aria-hidden="true">&#x1f6b2;</div>
    </div>
  </header>

  <main class="container layout" id="app" aria-busy="true">
    <section class="card summary" aria-labelledby="roadbook-title">
      <div id="roadbook-info" aria-live="polite">
        <p class="loading">Chargement du roadbook...</p>
      </div>
      <dl class="summary__stats" id="trip-stats" hidden></dl>
    </section>

    <section class="stage-picker" aria-labelledby="stage-picker-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Itineraire</p>
          <h2 id="stage-picker-title">Les etapes</h2>
        </div>
        <p id="stage-count"></p>
      </div>
      <ol id="stage-list" class="stage-list"></ol>
    </section>

    <nav class="day-nav" aria-label="Navigation entre les etapes">
      <button id="previous-day" type="button">&#x2190; <span>Precedent</span></button>
      <div class="day-nav__status">
        <span id="current-day"></span>
        <div class="progress" aria-hidden="true"><span id="progress-bar"></span></div>
      </div>
      <button id="next-day" type="button"><span>Suivant</span> &#x2192;</button>
    </nav>

    <article id="stage-detail" class="card stage" aria-labelledby="day-title" tabindex="-1">
      <p class="eyebrow" id="stage-label"></p>
      <h2 id="day-title"></h2>
      <div class="stats" id="stage-stats"></div>
      <div class="stage__description">
        <h3>Sur la route</h3>
        <p id="description"></p>
      </div>
    </article>

    <div class="details-grid" id="stage-details"></div>
  </main>

  <template id="stat-template">
    <div class="stat"><span class="stat__icon" aria-hidden="true"></span><div><small></small><strong></strong></div></div>
  </template>

  <template id="detail-template">
    <section class="card detail"><div class="detail__icon" aria-hidden="true"></div><div><h2></h2><div class="detail__content"></div></div></section>
  </template>

  <footer><div class="container"><strong id="footer-title"></strong><span id="footer-message"></span></div></footer>
  <script type="module" src="js/app.js"></script>
</body>
</html>
